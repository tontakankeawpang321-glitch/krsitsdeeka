<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องอังกฤษ — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f1f5f9; /* slate-100 */
        }
        /* Custom scrollbar for dialog */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Calendar day animations */
        .calendar-day { transition: all 0.2s ease-in-out; }
        .calendar-day:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900 mb-2 flex items-center gap-2">
                        <i class="ph-fill ph-calendar-check text-blue-600"></i>
                        Daily English Vocab
                    </h1>
                    <p class="text-slate-500">ท่องศัพท์วันละ 20 คำ สะสมความรู้ทุกวันอิงตามปฏิทินจริง</p>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl w-full md:w-auto flex items-center gap-4 shadow-inner">
                    <div class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-md">
                        <i class="ph-bold ph-chart-bar"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-blue-800 uppercase tracking-wide">สรุปเดือนนี้</p>
                        <p class="text-2xl font-bold text-slate-900 leading-none mt-1">
                            <span id="summary-completed">0</span>
                            <span class="text-lg text-slate-500 font-normal">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200">
            
            <!-- Calendar Header (Month Navigation) -->
            <div class="flex justify-between items-center mb-6">
                <h2 id="month-year-display" class="text-2xl font-bold text-slate-800">Month Year</h2>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-xl bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-600 transition-colors">
                        <i class="ph-bold ph-caret-left text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 font-medium transition-colors text-sm">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 rounded-xl bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-600 transition-colors">
                        <i class="ph-bold ph-caret-right text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-2 mb-2 text-center font-semibold text-slate-400 text-sm uppercase tracking-wider">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>

    </div>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-2xl bg-white rounded-3xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            
            <!-- Modal Header -->
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white relative z-10 shadow-sm">
                <div>
                    <h3 id="dialog-title" class="text-xl font-bold text-slate-800">วันที่ --/--/----</h3>
                    <p class="text-sm text-slate-500 mt-1">สุ่มคำศัพท์ 20 คำ สำหรับวันนี้</p>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-full transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-3 bg-slate-50/50">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-6 py-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeDialog()" class="px-6 py-2.5 text-slate-600 font-medium hover:bg-slate-100 rounded-xl transition-colors">
                    ปิดหน้าต่าง
                </button>
                <button id="btn-complete-day" class="px-6 py-2.5 bg-blue-600 text-white font-medium hover:bg-blue-700 rounded-xl shadow-md shadow-blue-600/20 transition-all active:scale-95 flex items-center gap-2">
                    <i class="ph-bold ph-check-circle"></i> ท่องเสร็จแล้ว
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); // สำหรับแสดงผลปฏิทิน
        let today = new Date(); // วันที่ปัจจุบันจริงๆ
        let selectedDateString = null; // วันที่กำลังเปิดใน Modal
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] // Array of string "YYYY-MM-DD"
        };

        function loadState() {
            const saved = localStorage.getItem('english_calendar_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('english_calendar_v1', JSON.stringify(appState));
        }

        // --- Vocabulary Pool (คลังคำศัพท์รวม) ---
        // นำคำศัพท์จาก Day 1, 2 เดิมมารวมกัน และเพิ่มให้มีเยอะขึ้นเพื่อการสุ่ม
        const vocabPool = [
            { word: "Absolutely", meaning: "อย่างแน่นอน, อย่างแท้จริง", example: "I absolutely agree with your point." },
            { word: "Bizarre", meaning: "แปลกประหลาด", example: "That's a bizarre story." },
            { word: "Crucial", meaning: "สำคัญมาก, วิกฤต", example: "Water is crucial for survival." },
            { word: "Determine", meaning: "ตัดสินใจ, กำหนด", example: "We need to determine the cause of the problem." },
            { word: "Emphasize", meaning: "เน้นย้ำ", example: "The teacher emphasized the importance of reading." },
            { word: "Fascinating", meaning: "น่าหลงใหล, น่าสนใจมาก", example: "The museum had a fascinating exhibit." },
            { word: "Genuine", meaning: "แท้จริง, จริงใจ", example: "She showed genuine interest in my project." },
            { word: "Hesitate", meaning: "ลังเล", example: "Don't hesitate to call me if you need help." },
            { word: "Implement", meaning: "นำไปปฏิบัติ, ทำให้มีผล", example: "We will implement the new policy next month." },
            { word: "Justify", meaning: "แสดงให้เห็นถึงเหตุผล, พิสูจน์ว่าถูกต้อง", example: "Can you justify your decision?" },
            { word: "Knowledgeable", meaning: "มีความรู้มาก", example: "He is very knowledgeable about history." },
            { word: "Literally", meaning: "อย่างแท้จริง, ตามตัวอักษร", example: "I was literally starving." },
            { word: "Maintain", meaning: "รักษาไว้, บำรุง", example: "It's important to maintain a healthy diet." },
            { word: "Negotiate", meaning: "เจรจาต่อรอง", example: "They are trying to negotiate a peace treaty." },
            { word: "Observe", meaning: "สังเกต", example: "Observe how the birds build their nests." },
            { word: "Persuade", meaning: "ชักชวน, โน้มน้าว", example: "I tried to persuade him to come with us." },
            { word: "Significant", meaning: "สำคัญ, มีความหมาย", example: "There was a significant change in the weather." },
            { word: "Tolerate", meaning: "อดทน, ยอมรับ", example: "I will not tolerate bad behavior." },
            { word: "Utilize", meaning: "ใช้ประโยชน์", example: "We must utilize all available resources." },
            { word: "Vulnerable", meaning: "อ่อนแอ, เปราะบาง", example: "Elderly people are particularly vulnerable to the virus." },
            { word: "Accommodate", meaning: "จัดให้เหมาะสม, ให้ที่พัก", example: "The hotel can accommodate up to 500 guests." },
            { word: "Beneficial", meaning: "เป็นประโยชน์", example: "Exercise is beneficial to your health." },
            { word: "Consequence", meaning: "ผลลัพธ์, ผลที่ตามมา", example: "He must face the consequences of his actions." },
            { word: "Dilemma", meaning: "สภาวะกลืนไม่เข้าคายไม่ออก", example: "I'm in a dilemma about which job offer to accept." },
            { word: "Evaluate", meaning: "ประเมินผล", example: "The teacher will evaluate your performance." },
            { word: "Flaw", meaning: "ข้อบกพร่อง, ตำหนิ", example: "There is a minor flaw in this design." },
            { word: "Grasp", meaning: "จับ, เข้าใจ", example: "I finally grasped the concept of the lesson." },
            { word: "Hypothesis", meaning: "สมมติฐาน", example: "The scientists are testing a new hypothesis." },
            { word: "Interpret", meaning: "ตีความ, แปล", example: "How do you interpret this poem?" },
            { word: "Jeopardize", meaning: "ทำให้ตกอยู่ในอันตราย", example: "His mistake could jeopardize the entire project." },
            { word: "Lucrative", meaning: "ได้กำไรดี", example: "She runs a very lucrative business." },
            { word: "Mandatory", meaning: "บังคับ, จำเป็นต้องทำ", example: "Attendance at the meeting is mandatory." },
            { word: "Notorious", meaning: "มีชื่อเสียงในทางไม่ดี", example: "The city is notorious for its traffic jams." },
            { word: "Obsolete", meaning: "ล้าสมัย, เลิกใช้แล้ว", example: "Typewriters are now largely obsolete." },
            { word: "Prominent", meaning: "โดดเด่น, มีชื่อเสียง", example: "He is a prominent figure in the tech industry." },
            { word: "Retrieve", meaning: "ได้กลับคืนมา, กู้คืน", example: "I need to retrieve my data from the broken hard drive." },
            { word: "Spontaneous", meaning: "เกิดขึ้นเอง, ไม่ได้เตรียมตัว", example: "We took a spontaneous trip to the beach." },
            { word: "Tedious", meaning: "น่าเบื่อ, ยืดเยื้อ", example: "Data entry can be a very tedious task." },
            { word: "Unanimous", meaning: "เป็นเอกฉันท์", example: "The committee reached a unanimous decision." },
            { word: "Verify", meaning: "ตรวจสอบความถูกต้อง", example: "Please verify your account via email." },
            // เพิ่มคำศัพท์จำลองเพิ่มเติมให้มีเพียงพอต่อการสุ่ม
            { word: "Abundant", meaning: "มากมาย, อุดมสมบูรณ์", example: "There is an abundant supply of water." },
            { word: "Banish", meaning: "เนรเทศ, ขจัดออกไป", example: "He was banished from the country." },
            { word: "Candid", meaning: "ตรงไปตรงมา, เปิดเผย", example: "Give me your candid opinion." },
            { word: "Deceive", meaning: "หลอกลวง", example: "He tried to deceive me into giving him money." },
            { word: "Endure", meaning: "อดทน, คงอยู่", example: "She had to endure a lot of pain." },
            { word: "Feasible", meaning: "เป็นไปได้, สามารถทำได้", example: "Is this plan practically feasible?" },
            { word: "Glimpse", meaning: "มองแวบเดียว, เหลือบเห็น", example: "I caught a glimpse of her in the crowd." },
            { word: "Hinder", meaning: "ขัดขวาง, เป็นอุปสรรค", example: "Bad weather hindered our progress." },
            { word: "Illuminate", meaning: "ส่องสว่าง, ทำให้ชัดเจน", example: "The presentation illuminated the main issues." },
            { word: "Jargon", meaning: "ศัพท์เฉพาะวงการ", example: "The document is full of legal jargon." }
        ];

        // ฟังก์ชันสุ่มอาเรย์ (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ฟังก์ชันดึงคำศัพท์แบบสุ่ม 20 คำ
        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            // ถ้าคลังคำศัพท์มีน้อยกว่า 20 ให้เอาเท่าที่มี ถ้ามีมากกว่าให้ตัดมา 20
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            // คืนค่ารูปแบบ YYYY-MM-DD
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // อัปเดต Header
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay(); // วันแรกของเดือนตรงกับวันอะไร (0-6)
            const daysInMonth = new Date(year, month + 1, 0).getDate(); // จำนวนวันในเดือนนี้
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // สร้างช่องว่างสำหรับวันก่อนหน้าของเดือน
            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-2 md:p-4 rounded-2xl bg-slate-50 border border-transparent opacity-50"></div>`;
            }

            let completedThisMonth = 0;

            // สร้างช่องวันที่
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                // กำหนดสไตล์ตามสถานะ
                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-3 md:p-5 rounded-2xl border cursor-pointer select-none min-h-[80px] md:min-h-[100px]";
                
                let stateClasses = "";
                let dotHTML = "";
                let iconHTML = "";

                if (isCompleted) {
                    // อ่านแล้ว
                    stateClasses = "bg-green-50 border-green-200 text-green-800 shadow-sm";
                    dotHTML = `<div class="absolute top-2 right-2 md:top-3 md:right-3 w-2.5 h-2.5 bg-green-500 rounded-full shadow-sm ring-2 ring-white"></div>`;
                    iconHTML = `<i class="ph-fill ph-check-circle text-green-500 text-xl md:text-2xl mt-1 opacity-80"></i>`;
                } else if (isToday) {
                    // วันนี้แต่ยังไม่อ่าน
                    stateClasses = "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-600/30";
                    iconHTML = `<span class="text-[10px] md:text-xs font-medium bg-white/20 px-2 py-0.5 rounded-full mt-1">วันนี้</span>`;
                } else {
                    // วันทั่วไปยังไม่อ่าน
                    stateClasses = "bg-white border-slate-200 text-slate-700 hover:border-blue-400 hover:shadow-md";
                    iconHTML = `<i class="ph ph-book-open text-slate-300 text-xl md:text-2xl mt-1 group-hover:text-blue-400 transition-colors"></i>`;
                }

                const cardHTML = `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        ${dotHTML}
                        <span class="text-xl md:text-2xl font-bold">${day}</span>
                        ${iconHTML}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }

            // อัปเดต Summary
            document.getElementById('summary-completed').innerText = completedThisMonth;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const displayDate = getDisplayDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            const dialog = document.getElementById('vocab-dialog');
            const title = document.getElementById('dialog-title');
            const content = document.getElementById('dialog-content');
            const btnComplete = document.getElementById('btn-complete-day');

            title.innerText = `วันที่ ${displayDate}`;

            // Render Vocab List (สุ่มใหม่ทุกครั้งที่เปิด)
            const vocabList = getRandomVocab();
            content.innerHTML = '';
            
            vocabList.forEach((v, index) => {
                const itemHTML = `
                    <div class="p-4 bg-white border border-slate-200 rounded-2xl hover:border-blue-300 hover:shadow-md transition-all">
                        <div class="flex items-start gap-4">
                            <div class="bg-blue-50 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg shrink-0 border border-blue-100">
                                ${index + 1}
                            </div>
                            <div class="flex-1">
                                <h4 class="text-lg font-bold text-slate-900 mb-1 flex items-center gap-2">
                                    ${v.word}
                                    <button onclick="speakWord('${v.word}')" class="text-slate-400 hover:text-blue-500 transition-colors" title="ฟังเสียง">
                                        <i class="ph-fill ph-speaker-high"></i>
                                    </button>
                                </h4>
                                <p class="text-slate-600 font-medium mb-3 border-b border-slate-100 pb-2">${v.meaning}</p>
                                <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100 relative">
                                    <i class="ph-fill ph-quotes text-slate-200 text-3xl absolute top-2 right-2"></i>
                                    <p class="text-sm text-slate-600 relative z-10 font-serif italic pr-6">${v.example}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML += itemHTML;
            });

            // Update Complete Button State
            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-check"></i> ทบทวนเสร็จสิ้น (อ่านแล้ว)`;
                btnComplete.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'shadow-blue-600/20');
                btnComplete.classList.add('bg-green-500', 'hover:bg-green-600', 'shadow-green-500/20');
                btnComplete.onclick = closeDialog; // แค่ปิดหน้าต่าง
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle"></i> ท่องเสร็จแล้ว (บันทึก)`;
                btnComplete.classList.remove('bg-green-500', 'hover:bg-green-600', 'shadow-green-500/20');
                btnComplete.classList.add('bg-blue-600', 'hover:bg-blue-700', 'shadow-blue-600/20');
                btnComplete.onclick = markDayAsComplete; // บันทึกลงปฏิทิน
            }

            // Show Dialog
            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // Scroll modal back to top
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar(); // อัปเดตปฏิทินและสถิติ
            }
            closeDialog();
        }

        // ฟังก์ชันเสริม: อ่านออกเสียงคำศัพท์ (ใช้ Web Speech API)
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Initialization ---
        window.onload = () => {
            loadState();
            renderCalendar();
        };

        // ปิด Modal เมื่อกดปุ่ม ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
