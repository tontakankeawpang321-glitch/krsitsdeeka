<!DOCTYPE html> 
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แนวข้อสอบนาฏศิลป์ไทย – 500 ข้อ (ตัวอย่างเริ่มต้น 120 ข้อ)</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0f172a; --bg:#f8fafc; --card:#fff;
    --blue:#0ea5e9; --blue-d:#0284c7; --muted:#64748b;
    --radius:12px; --shadow:0 8px 24px rgba(2,6,23,.08);
    --green:#16a34a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Sarabun",system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--ink)}
  .wrap{max-width:1000px;margin:auto;padding:18px}
  h1{margin:6px 0 2px;font-size:clamp(20px,3.8vw,32px)}
  .muted{color:var(--muted);margin-bottom:14px}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}
  .btn{appearance:none;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;color:#fff;background:var(--green);box-shadow:var(--shadow)}
  .btn:hover{filter:brightness(.95)}
  .btn.gray{background:#334155}
  .grid{display:grid;gap:12px;grid-template-columns:1fr}
  @media(min-width:760px){ .grid{grid-template-columns:1fr 1fr} }
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;position:relative;overflow:hidden}
  .q-title{font-weight:700;margin:0 0 8px}
  .choices{display:grid;gap:8px}
  label.choice{display:flex;gap:10px;align-items:center;background:#f1f5f9;padding:9px 10px;border-radius:10px;border:2px solid transparent;cursor:pointer}
  label.choice:hover{border-color:#22c55e55}
  input[type=radio]{accent-color:var(--green);transform:scale(1.1)}
  .q-actions{margin-top:10px}
  .btn-ans{background:var(--blue);border:0;border-radius:10px;color:#fff;padding:8px 12px;font-weight:700;cursor:pointer}
  .btn-ans:hover{background:var(--blue-d)}
  footer{color:var(--muted);text-align:center;padding:24px 0}

  /* เอฟเฟกต์ “ทำแล้ว” */
  .card.done::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,0) 45%);
    pointer-events:none;
  }
  .badge-done{
    position:absolute; top:10px; right:10px;
    padding:6px 10px; border-radius:999px;
    background:rgba(255,255,255,.9);
    box-shadow:0 6px 16px rgba(2,6,23,.15);
    font-weight:700; font-size:13px; color:#065f46;
    display:flex; align-items:center; gap:6px;
    opacity:0; transform:translateY(-6px); transition:.2s;
  }
  .badge-dot{
    width:10px; height:10px; border-radius:50%; background:#10b981;
    box-shadow:0 0 0 3px rgba(16,185,129,.25);
  }
  .card.done .badge-done{ opacity:1; transform:none }
  .card.done .choice{ opacity:.75; cursor:default }
  .card.done input[type=radio]{ cursor:not-allowed }
</style>
</head>
<body>
<div class="wrap">
  <h1>แนวข้อสอบนาฏศิลป์ไทย (เป้าหมาย 500 ข้อ)</h1>
  <div class="muted">* ใช้ฝึกความรู้–ความเข้าใจ ประวัติ ความเป็นมา บุคคลสำคัญ นาฏยศัพท์ โขน–ละคร เพลงหน้าพาทย์ เครื่องแต่งกาย วงปี่พาทย์ ฯลฯ</div>
  <div class="tools">
    <button id="shuffleBtn" class="btn">สุ่มเรียงข้อ</button>
    <button id="resetBtn" class="btn gray">รีเซ็ตคำตอบ</button>
  </div>
  <div id="quiz" class="grid" aria-live="polite"></div>
  <footer>กด “เฉลย” เพื่อตรวจทีละข้อ • เพิ่ม/แก้ได้ในตัวแปร <code>questions</code> (รูปแบบ { q, a, c[] })</footer>
</div>

<script>
/* =========================================================
   🔹 ธีมเดิมทุกอย่างคงไว้ เปลี่ยนเฉพาะเนื้อหาข้อสอบเป็น “นาฏศิลป์ไทย”
   🔹 ตัวอย่างเริ่ม 120 ข้อ — เติมต่อให้ครบ 1000 ข้อได้เลยในอาร์เรย์เดียวกัน
   ========================================================= */

// หมายเหตุ: เพื่อความปลอดภัยในการท่องจำ ผมใช้หัวข้อกว้าง ๆ ที่เป็นความรู้ทั่วไปของนาฏศิลป์ไทย
// (โขน-ละคร-ระบำ-นาฏยศัพท์-เครื่องดนตรี-เพลงหน้าพาทย์-พิธีไหว้ครู-วงปี่พาทย์-เครื่องแต่งกาย ฯลฯ)
// และหลีกเลี่ยงรายละเอียดปลายเปิด/แตกสายสำนักที่อาจไม่ตรงตำราแต่ละแห่ง

const questions = [

/* ========== 1) ความรู้พื้นฐาน & คำจำกัดความ (15 ข้อ) ========== */
{q:"“นาฏศิลป์” โดยความหมายทั่วไปหมายถึงข้อใด",a:"ศิลปะแห่งการฟ้อนรำ การเคลื่อนไหวประกอบดนตรีและเรื่องราว",c:["ศิลปะการวาดภาพสีน้ำ","ศิลปะการขับร้องเดี่ยวเท่านั้น","ศิลปะการแสดงตลก"]},
{q:"โขนแตกต่างจากละครอย่างเด่นชัดที่ข้อใด",a:"โขนสวมหัวโขนและพูด/ร้องแทนด้วยปี่พาทย์หรือนายโรง",c:["โขนไม่มีดนตรีประกอบ","โขนแสดงกลางวันเท่านั้น","โขนผู้หญิงแสดงเท่านั้น"]},
{q:"องค์ประกอบหลักของการแสดงนาฏศิลป์ไทยทั่วไป",a:"ตัวแสดง ดนตรี/เพลง หน้าพาทย์ เรื่องราว/บท และเครื่องแต่งกาย",c:["เฉพาะตัวแสดงกับฉาก","เฉพาะดนตรีกับแสงสี","เฉพาะฉากและอุปกรณ์"]},
{q:"“นาฏยศัพท์” คืออะไร",a:"คำศัพท์เฉพาะที่ใช้เรียกท่ารำ/อาการรำ",c:["ชื่อวงดนตรี","ชื่อฉากแสดง","ชื่อประเภทละคร"]},
{q:"“ตั้งวง” ในท่าพื้นหญิง หมายถึง",a:"ยกแขนโค้งงามระดับอก/ศีรษะตามระดับท่า",c:["ยกแขนตรงแนบลำตัว","กางแขนขนานพื้นเสมอ","ประนมมือเหนือศีรษะ"]},
{q:"ท่าพื้นฐานที่ใช้ร่วมกันทั้งหญิงและชายคือ",a:"จีบ–ยก–ก้าว–เชิด–เคาะเท้า (แล้วแต่บริบทท่า)",c:["เฉพาะตั้งวงเท่านั้น","มีเฉพาะผู้หญิง","ไม่มีใช้ร่วมกัน"]},
{q:"“จีบ” หมายถึง",a:"การจัดนิ้วให้โค้งงามคล้ายกลีบดอกไม้",c:["กำมือแน่น","แบมือชี้ตรง","ชูนิ้วชี้"]},
{q:"หน้าที่ของเพลงหน้าพาทย์ในนาฏศิลป์ไทย",a:"กำกับอารมณ์ จังหวะ เหตุการณ์ และกิริยาตัวละคร",c:["ใช้เฉพาะเปิดม่าน","ใช้แทนบทพูดทั้งหมดเสมอ","ใช้เพื่อบรรเลงพักเท่านั้น"]},
{q:"“พานครู” ที่ใช้ในพิธีไหว้ครูนาฏศิลป์มีความหมายหลักคือ",a:"แสดงความเคารพบูรพาจารย์และขอพรให้การเรียนการแสดงราบรื่น",c:["เป็นอุปกรณ์ประกอบฉาก","ใช้วางเครื่องแต่งกาย","ใช้เก็บเครื่องดนตรี"]},
{q:"การเคลื่อนไหวแบบ “เชิด” ให้ความรู้สึกใด",a:"องอาจ กระฉับกระเฉง คล่องแคล่ว",c:["เศร้าสลด","ง่วงซึม","เกียจคร้าน"]},
{q:"“เสมอ” ในหน้าพาทย์สัมพันธ์กับอารมณ์/กิริยาอย่างไร",a:"เทียบเท่า เดิน/เคลื่อนแบบปกติเป็นหลัก",c:["รุกไล่เต็มกำลัง","โศกเศร้ารำพัน","ขับเคลื่อนอย่างลับ ๆ"]},
{q:"การรำตัวพระในโขน–ละครโดยทั่วไปให้ภาพลักษณ์แบบใด",a:"สง่า สุภาพ นุ่มนวลแต่มีอำนาจ",c:["เก้งก้าง ไม่เป็นระเบียบ","ล้อเลียนตลก","หยาบกระด้างรุนแรงเสมอ"]},
{q:"การรำตัวลิง (เช่น หนุมาน) เน้นลักษณะใด",a:"ว่องไว ซุกซน คล่องตัว มีลูกเล่นเชิงกายกรรม",c:["ช้า ๆ สม่ำเสมอ","นิ่งไม่เคลื่อนไหว","เนิบละมุนแบบตัวนาง"]},
{q:"จังหวะดนตรีกับท่ารำสัมพันธ์กันอย่างไร",a:"เป็นหนึ่งเดียว จังหวะดนตรีกำกับการขึ้น–ลงท่าและอารมณ์",c:["ไม่เกี่ยวกัน","ดนตรีช้าท่าต้องเร็ว","ดนตรีเร็วท่าต้องช้าเสมอ"]},
{q:"ศิลปะการแสดงไทยที่ได้รับอิทธิพลรามายณะ (รามเกียรติ์) ชัดเจนคือ",a:"โขน",c:["ลำตัด","โนรา","เซิ้งบั้งไฟ"]},

/* ========== 2) ประเภทการแสดง (โขน–ละคร–ระบำ/รำ) (15 ข้อ) ========== */
{q:"“ละครใน” โดยดั้งเดิมแสดงโดยใคร",a:"สตรีในราชสำนัก",c:["ชายล้วน","คณะชาวบ้าน","เฉพาะพระสงฆ์"]},
{q:"“ละครนอก” มีลักษณะเด่นใด",a:"สนุกสนาน คะนอง จังหวะเร็ว เน้นความบันเทิง",c:["เคร่งขรึมพิธีรีตองเท่านั้น","ไม่มีบทเพลงประกอบ","เล่นเฉพาะในวัง"]},
{q:"“ละครดึกดำบรรพ์” เกี่ยวข้องกับยุคสมัยใด",a:"เริ่มนิยมในรัชกาลที่ 5 รับรูปแบบตะวันตกบางส่วน",c:["ยุครัตนโกสินทร์ตอนต้น ร.1","อยุธยาตอนต้น","สุโขทัยแท้ ๆ"]},
{q:"“ละครพันทาง” หมายถึง",a:"ละครที่ผสมผสานหลายลีลาทั้งไทย–ต่างชาติ/พื้นเมือง",c:["ละครพูดล้วน","ละครไม่มีดนตรี","ละครตลกสั้น ๆ"]},
{q:"โขนมีประเภทเวทีสำคัญเช่น",a:"โขนโรงนอก โขนหน้าจอ โขนกลางแปลง ฯลฯ",c:["มีแค่ชนิดเดียว","มีเฉพาะหน้าจอ","เฉพาะโรงละครสากล"]},
{q:"“ระบำ” โดยทั่วไปต่างจาก “รำเดี่ยว” ที่จุดใด",a:"ระบำเป็นหมู่/ชุด มีแบบแผนพร้อมเพรียง",c:["ระบำคือการวิ่ง","ระบำไม่มีดนตรี","ระบำไม่มีเครื่องแต่งกาย"]},
{q:"“รำเดี่ยว/รำคู่” เน้นอะไร",a:"ทักษะเฉพาะตัว/บทบาทสัมพันธ์กันของผู้รำ",c:["เน้นอุปกรณ์ใหญ่","ไม่มีชั้นเชิงมือ","ไม่สนท่วงทำนองเพลง"]},
{q:"“เสภา–ละครรำ” ความสัมพันธ์ถูกต้องคือ",a:"เสภาเป็นคำกลอนทำนองขับร้อง ใช้กับละครรำบางเรื่อง",c:["เสภาคือเครื่องแต่งกาย","เสภาเป็นหน้าพาทย์","เสภาพูดแทนดนตรีทั้งหมด"]},
{q:"การรำอวยพร/ต้อนรับแขกนิยมใช้ชุดใด",a:"ระบำต้อนรับ/รำอวยพรตามท้องถิ่น เช่น ฟ้อนเล็บ",c:["เฉพาะรำกลองยาว","เฉพาะรำโทน","เฉพาะโขนรำ"]},
{q:"“ฟ้อน” มักพบในศิลปะภาคใด",a:"ภาคเหนือ (ล้านนา) เช่น ฟ้อนเล็บ ฟ้อนเทียน",c:["ภาคกลางเท่านั้น","อีสานเท่านั้น","ใต้เท่านั้น"]},
{q:"“โนรา” เป็นศิลปะพื้นบ้านภาคใด",a:"ภาคใต้",c:["ภาคเหนือ","ภาคกลาง","ภาคอีสาน"]},
{q:"“เซิ้ง” เป็นลีลาพื้นถิ่นภาคใด",a:"ภาคอีสาน",c:["ภาคเหนือ","ภาคกลาง","ภาคใต้"]},
{q:"“รำโทน–รำวงมาตรฐาน” จัดอยู่ในกลุ่มใด",a:"รำพื้นบ้าน/ดัดแปลงเพื่อความเป็นเอกภาพร่วมสมัย",c:["โขนหน้าจอ","ละครใน","ดนตรีบรรเลงล้วน"]},
{q:"“รำแม่บท” มุ่งเน้นอะไร",a:"แบบฝึกท่าพื้นฐาน เป็นต้นเค้าของลีลารำไทย",c:["การแสดงตลก","การเต้นสากล","การยืนเฉย ๆ"]},
{q:"รำอาวุธ/รำกระบี่กระบองสัมพันธ์กับข้อใด",a:"ศิลปะการต่อสู้และสาธิตเชิงนาฏยยุทธ์",c:["การขับร้องหมอลำ","การละเล่นลิเก","การทอผ้า"]},

/* ========== 3) เพลงหน้าพาทย์ & วงปี่พาทย์ (15 ข้อ) ========== */
{q:"วงดนตรีหลักที่ใช้กับโขน–ละครไทยคือ",a:"วงปี่พาทย์",c:["วงซอสามสาย","วงเครื่องสายฝรั่ง","วงโยธวาทิต"]},
{q:"เครื่องดนตรีหลักในวงปี่พาทย์ (ข้อใดถูก)",a:"ระนาดเอก ระนาดทุ้ม ฆ้องวง ปี่ใน ตะโพน ฉิ่ง ฉาบ กลองทัด ฯลฯ",c:["กีตาร์ ไวโอลิน เปียโน","พิณซิ่ง แคน โปงลาง","จะเข้ ซออู้ ขิมเท่านั้น"]},
{q:"หน้าพาทย์ที่ใช้กับเหตุการณ์เคลื่อนทัพ/เคลื่อนขบวน",a:"เชิด/เชิดฉาน (และเชิดพระพิรุณ ฯลฯ ตามบริบท)",c:["โอด","สาธุการ","ตระนอน"]},
{q:"เพลง “สาธุการ” ใช้เมื่อใด",a:"ขึ้นต้น/บูชาครู เปิดพิธีการ",c:["ต่อสู้","คร่ำครวญ","แย่งชิง"]},
{q:"เพลงหน้าพาทย์ที่สื่ออารมณ์เศร้าโศกสะเทือนใจ",a:"มอญร้องไห้ (และเพลงโอดบางทำนอง)",c:["เชิด","กราวนอก","เสมอ"]},
{q:"“กราวนอก/กราวใน” ใช้กับบริบทใดโดยกว้าง",a:"แสดงความยิ่งใหญ่/องอาจ หรือเข้าพิธี–เข้าที่",c:["หลับใหล","สับสนอลหม่าน","ตลกโปกฮา"]},
{q:"บท “พราหมณ์เข้า” มีนัยอะไร",a:"เชิญสิ่งศักดิ์สิทธิ์/เปิดพิธีตามแบบพราหมณ์",c:["บทปลอบใจ","บทมุขตลก","บทร่ายเวทมนตร์ร้าย"]},
{q:"การ “ลงจังหวะ” ของฉิ่ง–ฉาบสำคัญอย่างไร",a:"คุมช่องไฟ–สัมผัสท่ารำให้ลงตัว",c:["ใช้ตกแต่งเฉย ๆ","ไม่เกี่ยวกับผู้รำ","ใช้เฉพาะตอนจบ"]},
{q:"ตะโพนมีบทบาทอย่างไรในวงปี่พาทย์",a:"ให้จังหวะหลัก คุมเร่ง–ผ่อนของวง",c:["เล่นทำนองหลัก","ใช้ร้องคำ","ใช้โฆษณา"]},
{q:"ปี่ในต่างจากปี่นอกอย่างไรโดยกว้าง",a:"ปี่ในเสียงแหลม ลีลาหลักวงปี่พาทย์กลาง/เครื่องห้า–เครื่องคู่",c:["ปี่ในไม่มีลิ้น","ปี่ในใช้ตีด้วยไม้","ปี่ในเป็นเครื่องสาย"]},

// 🔹 Render & Interactions (คงเดิม)
// ==========================
const quizEl = document.getElementById('quiz');

function shuffle(arr){ return arr.map(v=>({v,r:Math.random()})).sort((a,b)=>a.r-b.r).map(o=>o.v); }

function render(){
  quizEl.innerHTML = '';
  questions.forEach((item, i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    const name = 'q'+i;
    const opts = shuffle([item.a, ...item.c]);

    card.innerHTML = `
      <div class="badge-done" hidden>
        <span class="badge-dot"></span> ✓ ทำแล้ว
      </div>
      <div class="q-title">ข้อ ${i+1}. ${item.q}</div>
      <div class="choices" role="group" aria-label="ตัวเลือกข้อที่ ${i+1}">
        ${opts.map(o=>`
          <label class="choice">
            <input type="radio" name="${name}" value="${o}">
            <span>${o}</span>
          </label>
        `).join('')}
      </div>
      <div class="q-actions">
        <button class="btn-ans" data-ans>เฉลย</button>
      </div>
    `;
    card.querySelector('[data-ans]').addEventListener('click', ()=>checkAnswer(i, card, item.a));
    quizEl.appendChild(card);
  });
}

function markDone(root){
  root.classList.add('done');
  const badge = root.querySelector('.badge-done');
  if(badge) badge.hidden = false;
  root.querySelectorAll('input[type=radio]').forEach(r=>r.disabled = true);
}

function checkAnswer(i, root, correct){
  const picked = root.querySelector(`input[name="q${i}"]:checked`);
  if(!picked){
    Swal.fire({icon:'warning',title:'กรุณาเลือกคำตอบ',confirmButtonText:'ตกลง'});
    return;
  }
  const ok = picked.value === correct;
  Swal.fire({
    icon: ok?'success':'error',
    title: ok?'✅ ตอบถูกต้อง':'❌ ตอบผิด',
    text: ok ? 'เก่งมาก! ทำต่อเลย' : `คำตอบที่ถูกคือ: ${correct}`,
    confirmButtonText:'ปิด'
  }).then(()=> {
    markDone(root);
  });
}

document.getElementById('shuffleBtn').addEventListener('click', ()=>{
  for(let i=questions.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [questions[i],questions[j]] = [questions[j],questions[i]];
  }
  render();
  Swal.fire({icon:'info',title:'สุ่มเรียงข้อใหม่แล้ว',timer:1200,showConfirmButton:false});
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.querySelectorAll('input[type=radio]').forEach(r=>{ r.checked=false; r.disabled=false; });
  document.querySelectorAll('.card.done').forEach(card=>{
    card.classList.remove('done');
    const badge = card.querySelector('.badge-done');
    if(badge) badge.hidden = true;
  });
  Swal.fire({icon:'success',title:'รีเซ็ตคำตอบแล้ว',timer:1000,showConfirmButton:false});
});

render();
</script>
